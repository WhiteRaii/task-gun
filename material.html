<script>
// ===== Data sources =====
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzqaEc5KsAIyNx7CBrUcAqvTjD90EMTQBS5bgfI-7MB_2DNd4Ki5LHWMo1zAi9ogtq7/exec';
const FALLBACK_JSON_URL = 'https://raw.githubusercontent.com/WhiteRaii/task-gun/main/data/material-forecast.json';

function toJsdelivr(url) {
  const m = url.match(/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\/(.+)$/);
  if (!m) return null;
  const [, owner, repo, branch, path] = m;
  return `https://cdn.jsdelivr.net/gh/${owner}/${repo}@${branch}/${path}`;
}
async function fetchOnce(url) {
  const sep = url.includes('?') ? '&' : '?';
  const r = await fetch(url + sep + '_=' + Date.now(), { cache: 'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function fetchLive(url) {
  try { return await fetchOnce(url); }
  catch (e1) { await new Promise(res => setTimeout(res, 800)); return await fetchOnce(url); }
}
async function fetchFallback(url) {
  try { return await fetchOnce(url); }
  catch (e1) {
    await new Promise(res => setTimeout(res, 800));
    try { return await fetchOnce(url); }
    catch (e2) {
      const mirror = toJsdelivr(url);
      if (mirror) return await fetchOnce(mirror);
      throw e2;
    }
  }
}

function fmtNum(n) {
  if (n === null || n === undefined || n === '') return '—';
  const num = Number(n);
  if (isNaN(num)) return String(n);
  return num.toLocaleString('en-US');
}
function fmtCost(v) {
  if (v === null || v === undefined || v === '' || isNaN(v)) return '—';
  return '฿' + Math.round(v).toLocaleString('en-US');
}
function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s == null ? '' : s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
function formatThousands(v) {
  const n = Number(String(v).replace(/,/g,'')) || 0;
  return n.toLocaleString('en-US');
}
function parseThousands(v) {
  return Number(String(v).replace(/,/g,'')) || 0;
}

const STATUS_MAP = {
  '🔴 Critical Shortage': { cls: 'critical', label: '🔴 ขาดวิกฤต' },
  '[CRITICAL] Critical Shortage': { cls: 'critical', label: '🔴 ขาดวิกฤต' },
  '⚠ Warning': { cls: 'warning', label: '⚠️ เฝ้าระวัง' },
  '✅ Sufficient': { cls: 'ok', label: '✅ เพียงพอ' },
};
function statusInfo(status) {
  return STATUS_MAP[status] || { cls: 'warning', label: status || '—' };
}

const PROC_STATUS_OPTIONS = ['', 'Not Ordered', 'PO Issued', 'Delivered'];
const AWARD_OPTIONS = ['', 'Yes', 'No'];
const BRAND_COLORS = { 'Draka': '#e53e3e', 'Prysmian': '#2b6cb0', 'Link': '#38a169', 'Other': '#a0aec0' };
const SIZE_COLORS = { '4': '#63b3ed', '6': '#4299e1', '10': '#2b6cb0', '16': '#1a365d' };

function detectBrandSize(sheetName) {
  const parts = String(sheetName || '').split('#');
  return { brand: (parts[0] || '').trim(), size: (parts[1] || '').trim() };
}

// ---------- Parse "Summary" raw 2D array (only for curated fields: status/reorder/unit price/stock) ----------
function parseSummary(summaryRaw) {
  const byName = {};
  if (!Array.isArray(summaryRaw)) return { byName };
  const statusHeaderIdx = summaryRaw.findIndex(r => String((r||[])[1] || '').includes('Cable Type'));
  if (statusHeaderIdx !== -1) {
    for (let r = statusHeaderIdx + 1; r < summaryRaw.length; r++) {
      const row = summaryRaw[r] || [];
      const name = row[1];
      if (!name) break;
      if (String(name).toUpperCase() === 'GRAND TOTAL') break;
      byName[name] = { stock_on_hand: row[9], unit_price_thb_per_m: row[12], status: row[13] };
    }
  }
  const trigHeaderIdx = summaryRaw.findIndex(r => String((r||[])[1] || '').includes('Near-Term'));
  if (trigHeaderIdx !== -1) {
    for (let r = trigHeaderIdx + 1; r < summaryRaw.length; r++) {
      const row = summaryRaw[r] || [];
      const name = row[0];
      if (!name) break;
      if (!byName[name]) byName[name] = {};
      byName[name].reorder_flag = row[5];
    }
  }
  return { byName };
}

const MONTHS = ['Apr-26','May-26','Jun-26','Jul-26','Aug-26','Sep-26'];

function buildCableTypes(liveData) {
  const { byName } = parseSummary(liveData.summary);
  const cableTypes = (liveData.cableTypes || []).map(sheet => {
    const s = byName[sheet.name] || {};
    const projects = (sheet.projects || []).map(p => ({
      project: p['Project'],
      total_qty_m: Number(p['Total Qty (m)']) || 0,
      monthly: MONTHS.reduce((acc, m) => { acc[m] = Number(p[m]) || 0; return acc; }, {}),
      award: String(p['Award'] !== undefined ? p['Award'] : (p['Trigger'] || '')).trim(),
      status: p['Status'] || '',
      poNo: p['PO No.'] || '',
      deliveredQty: Number(p['Delivered Qty (m)']) || 0,
    }));
    const monthly_demand = {};
    MONTHS.forEach(m => monthly_demand[m] = projects.reduce((sum, p) => sum + p.monthly[m], 0));
    const total_demand_m = projects.reduce((sum, p) => sum + p.total_qty_m, 0);
    const stock_on_hand = Number(s.stock_on_hand) || 0;
    const shortage_m = stock_on_hand - total_demand_m;
    const unitPriceNum = parseFloat(s.unit_price_thb_per_m);
    const total_cost_thb = !isNaN(unitPriceNum) ? unitPriceNum * total_demand_m : null;
    const awardedCount = projects.filter(p => p.award.toLowerCase() === 'yes').length;
    return {
      name: sheet.name,
      status: s.status,
      reorder_flag: s.reorder_flag,
      monthly_demand, total_demand_m, stock_on_hand, shortage_m,
      unit_price_thb_per_m: !isNaN(unitPriceNum) ? unitPriceNum : null,
      total_cost_thb,
      trigger_project_count: awardedCount,
      projects,
    };
  });
  const grandTotal = {
    total_demand_m: cableTypes.reduce((s, c) => s + c.total_demand_m, 0),
    shortage_m: cableTypes.reduce((s, c) => s + c.shortage_m, 0),
  };
  return { cableTypes, grandTotal };
}

// ---------- Write-back to Apps Script Web App ----------
async function postUpdate(payload) {
  const r = await fetch(WEBAPP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  return r.json();
}

async function onFieldChange(sheetName, projectName, field, value, inputEl) {
  inputEl.disabled = true;
  const updates = {}; updates[field] = value;
  try {
    const res = await postUpdate({ action: 'updateProject', sheet: sheetName, project: projectName, updates });
    if (!res.ok) throw new Error(res.error || 'update failed');
    flashSaved(inputEl);
    if (field === 'Total Qty (m)' || field === 'Delivered Qty (m)' || field === 'Award') {
      await refreshData(true);
    }
  } catch (e) {
    console.error(e);
    alert('บันทึกไม่สำเร็จ: ' + e.message);
  } finally {
    inputEl.disabled = false;
  }
}
function flashSaved(el) {
  el.style.background = '#c6f6d5';
  setTimeout(() => { el.style.background = ''; }, 700);
}

async function addProject(sheetName, formEl) {
  const fd = new FormData(formEl);
  const monthKeys = ['apr','may','jun','jul','aug','sep'];
  const monthLabels = { apr:'Apr-26', may:'May-26', jun:'Jun-26', jul:'Jul-26', aug:'Aug-26', sep:'Sep-26' };
  const row = { 'Item': '', 'Project': fd.get('project'), 'Notes': fd.get('notes') || '', 'Award': fd.get('award') === 'on' ? 'Yes' : 'No' };
  let total = 0;
  monthKeys.forEach(k => { const v = Number(fd.get(k) || 0); row[monthLabels[k]] = v; total += v; });
  row['Total Qty (m)'] = total;
  if (!row.Project) { alert('กรุณากรอกชื่อโครงการ'); return; }
  const btn = formEl.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  try {
    const res = await postUpdate({ action: 'addProject', sheet: sheetName, row });
    if (!res.ok) throw new Error(res.error || 'add failed');
    await refreshData(true);
  } catch (e) {
    alert('เพิ่มโครงการไม่สำเร็จ: ' + e.message);
    btn.disabled = false; btn.textContent = 'บันทึก';
  }
}

async function addPO(formEl) {
  const fd = new FormData(formEl);
  const qty = Number(fd.get('qty') || 0);
  const price = Number(fd.get('price') || 0);
  const row = {
    'Date': fd.get('date'), 'PO No.': fd.get('pono'), 'Brand': fd.get('brand'), 'Cable Size': fd.get('size'),
    'Qty (m)': qty, 'Price/Unit (THB)': price, 'Total (THB)': qty * price, 'Project': fd.get('project') || '', 'Notes': ''
  };
  if (!row['PO No.'] || !row['Date']) { alert('กรุณากรอกวันที่และเลข PO'); return; }
  const btn = formEl.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  try {
    const res = await postUpdate({ action: 'addPO', row });
    if (!res.ok) throw new Error(res.error || 'add failed');
    await refreshData(true);
  } catch (e) {
    alert('เพิ่ม PO ไม่สำเร็จ: ' + e.message);
    btn.disabled = false; btn.textContent = 'บันทึก';
  }
}

// ---------- Price Monitoring ----------
let priceChartInstance = null;
let currentSizeFilter = 'all';

function renderPricePanel() {
  const purchaseOrders = (lastLiveData && lastLiveData.purchaseOrders) || [];
  const wrap = document.getElementById('price-monitoring-body');
  if (!wrap) return;

  const filtered = purchaseOrders.filter(po => currentSizeFilter === 'all' || String(po['Cable Size']).trim() === currentSizeFilter);
  const withDate = filtered.filter(po => po['Date']);

  document.getElementById('po-count').textContent = purchaseOrders.length + ' รายการ';

  if (withDate.length === 0) {
    wrap.innerHTML = `<div class="price-empty">📈 ยังไม่มีข้อมูลราคา PO ย้อนหลัง<br>เพิ่มด้วยฟอร์มด้านล่าง หรือกรอกตรงในแถบ "Purchase Orders" ใน Google Sheet ได้เลย</div>`;
  } else {
    const sorted = [...withDate].sort((a,b) => new Date(a['Date']) - new Date(b['Date']));
    const labels = [...new Set(sorted.map(po => po['Date']))];
    const byBrand = {};
    sorted.forEach(po => {
      const brand = String(po['Brand'] || 'Other').trim() || 'Other';
      if (!byBrand[brand]) byBrand[brand] = {};
      byBrand[brand][po['Date']] = Number(po['Price/Unit (THB)']) || 0;
    });
    const datasets = Object.keys(byBrand).map(brand => ({
      label: brand,
      data: labels.map(d => byBrand[brand][d] !== undefined ? byBrand[brand][d] : null),
      borderColor: BRAND_COLORS[brand] || BRAND_COLORS['Other'],
      backgroundColor: 'transparent',
      spanGaps: true,
      tension: 0.25,
    }));

    const historyRows = [...filtered].sort((a,b) => new Date(b['Date']) - new Date(a['Date'])).map(po => {
      const brand = String(po['Brand'] || 'Other').trim() || 'Other';
      return `<tr>
        <td>${esc(po['Date'])}</td>
        <td>${esc(po['PO No.'])}</td>
        <td><span class="brand-tag" style="background:${BRAND_COLORS[brand]||BRAND_COLORS['Other']}">${esc(brand)}</span></td>
        <td>${esc(po['Cable Size'])}</td>
        <td class="num">${fmtNum(po['Price/Unit (THB)'])}</td>
        <td class="num">${fmtCost(po['Total (THB)'])}</td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `<div class="price-chart-wrap"><canvas id="price-chart"></canvas></div>
      <table class="po-history-table">
        <thead><tr><th>วันที่</th><th>PO No.</th><th>Brand</th><th>เบอร์</th><th style="text-align:right">ราคา/เมตร</th><th style="text-align:right">รวม</th></tr></thead>
        <tbody>${historyRows}</tbody>
      </table>`;

    if (priceChartInstance) priceChartInstance.destroy();
    const ctx = document.getElementById('price-chart').getContext('2d');
    priceChartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { title: { display: true, text: 'บาท/เมตร' } } },
        plugins: { legend: { position: 'bottom' } }
      }
    });
  }
}

function onSizeFilterChange(val) {
  currentSizeFilter = val;
  renderPricePanel();
}

// ---------- Cable usage pie (by cable gauge) ----------
let usageChartInstance = null;
function renderUsagePie(cableTypes) {
  const bySize = {};
  cableTypes.forEach(c => {
    const { size } = detectBrandSize(c.name);
    bySize[size] = (bySize[size] || 0) + c.total_demand_m;
  });
  const sizes = Object.keys(bySize).filter(s => bySize[s] > 0);
  const wrap = document.getElementById('usage-pie-wrap');
  if (!wrap) return;
  if (sizes.length === 0) {
    wrap.innerHTML = '<div class="price-empty">ยังไม่มีข้อมูลปริมาณการใช้สาย</div>';
    return;
  }
  const total = sizes.reduce((s,k) => s + bySize[k], 0);
  const legend = sizes.map(s => `<div class="pie-legend-row">
      <div class="pie-legend-dot" style="background:${SIZE_COLORS[s] || '#a0aec0'}"></div>
      <div class="pie-legend-name">เบอร์ ${esc(s)}</div>
      <div class="pie-legend-val">${fmtNum(bySize[s])} m (${Math.round(bySize[s]/total*100)}%)</div>
    </div>`).join('');
  wrap.innerHTML = `<div class="pie-chart-wrap"><canvas id="usage-pie"></canvas></div><div class="pie-legend">${legend}</div>`;
  if (usageChartInstance) usageChartInstance.destroy();
  const ctx = document.getElementById('usage-pie').getContext('2d');
  usageChartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: sizes.map(s => 'เบอร์ ' + s),
      datasets: [{ data: sizes.map(s => bySize[s]), backgroundColor: sizes.map(s => SIZE_COLORS[s] || '#a0aec0') }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
}

function renderCableCard(c, idx, purchaseOrders) {
  const info = statusInfo(c.status);
  const reorderOk = String(c.reorder_flag || '').toUpperCase() === 'OK';
  const maxVal = Math.max(1, ...MONTHS.map(m => Number(c.monthly_demand?.[m]) || 0));
  const bars = MONTHS.map(m => {
    const v = Number(c.monthly_demand?.[m]) || 0;
    const h = Math.max(2, Math.round((v / maxVal) * 60));
    return `<div class="month-bar-wrap">
      <div class="month-bar-val">${v > 0 ? fmtNum(v) : ''}</div>
      <div class="month-bar" style="height:${h}px; background:${v>0 ? '#63b3ed' : '#e2e8f0'}"></div>
      <div class="month-bar-lbl">${m.replace('-26','')}</div>
    </div>`;
  }).join('');

  const { brand, size } = detectBrandSize(c.name);
  const poOptions = (purchaseOrders || []).filter(po => {
    const poBrand = String(po['Brand'] || '').trim();
    const poSize = String(po['Cable Size'] || '').trim();
    return (!brand || poBrand.toLowerCase() === brand.toLowerCase()) && (!size || poSize === size);
  });

  const projRows = (c.projects || []).map(p => {
    const remaining = Math.max(0, p.total_qty_m - p.deliveredQty);
    const poSelectOptions = ['<option value="">—</option>'].concat(
      poOptions.map(po => `<option value="${esc(po['PO No.'])}" ${po['PO No.']===p.poNo?'selected':''}>${esc(po['PO No.'])} (${fmtNum(po['Qty (m)'])} m)</option>`)
    ).join('');
    return `
    <tr>
      <td><input class="edit-input name-input" type="text" value="${esc(p.project)}"
          onchange="onFieldChange('${escAttr(c.name)}','${escAttr(p.project)}','Project',this.value,this)"></td>
      <td><input class="edit-input qty-input" type="text" inputmode="numeric" value="${formatThousands(p.total_qty_m)}"
          onfocus="this.value=this.value.replace(/,/g,'')"
          onchange="this.value=formatThousands(this.value); onFieldChange('${escAttr(c.name)}','${escAttr(p.project)}','Total Qty (m)',parseThousands(this.value),this)"></td>
      <td>
        <select class="edit-input" onchange="onFieldChange('${escAttr(c.name)}','${escAttr(p.project)}','Award',this.value,this)">
          ${AWARD_OPTIONS.map(o => `<option value="${o}" ${o===p.award?'selected':''}>${o || '—'}</option>`).join('')}
        </select>
      </td>
      <td>
        <select class="edit-input" onchange="onFieldChange('${escAttr(c.name)}','${escAttr(p.project)}','Status',this.value,this)">
          ${PROC_STATUS_OPTIONS.map(o => `<option value="${o}" ${o===p.status?'selected':''}>${o || '—'}</option>`).join('')}
        </select>
      </td>
      <td><select class="edit-input po-select" onchange="onFieldChange('${escAttr(c.name)}','${escAttr(p.project)}','PO No.',this.value,this)">${poSelectOptions}</select></td>
      <td><input class="edit-input qty-input" type="text" inputmode="numeric" value="${formatThousands(p.deliveredQty)}"
          onfocus="this.value=this.value.replace(/,/g,'')"
          onchange="this.value=formatThousands(this.value); onFieldChange('${escAttr(c.name)}','${escAttr(p.project)}','Delivered Qty (m)',parseThousands(this.value),this)"></td>
      <td class="qty remaining-val ${remaining===0?'zero':'pos'}">${fmtNum(remaining)} m</td>
    </tr>`;
  }).join('');

  const formId = 'addform-' + idx;
  return `
  <div class="cable-card status-${info.cls}">
    <div class="cable-head" onclick="toggleCable(${idx})">
      <span class="cable-name">${esc(c.name)}</span>
      <span class="cable-badge ${info.cls}">${info.label}</span>
      <span class="cable-reorder ${reorderOk ? 'ok' : ''}">${esc(c.reorder_flag) || '—'}</span>
      <span class="cable-toggle" id="toggle-icon-${idx}">▼ ดูรายละเอียด</span>
      <div class="cable-metrics" style="width:100%">
        <span><span class="m-lbl">ความต้องการรวม:</span> <span class="m-val">${fmtNum(c.total_demand_m)} m</span></span>
        <span><span class="m-lbl">คงเหลือในสต็อก:</span> <span class="m-val">${fmtNum(c.stock_on_hand)} m</span></span>
        <span><span class="m-lbl">ขาด/เกิน:</span> <span class="m-val ${Number(c.shortage_m) < 0 ? 'neg' : ''}">${fmtNum(c.shortage_m)} m</span></span>
        <span><span class="m-lbl">ราคา/ม.:</span> <span class="m-val">${c.unit_price_thb_per_m ? '฿' + c.unit_price_thb_per_m : 'N/A'}</span></span>
        <span><span class="m-lbl">มูลค่ารวม:</span> <span class="m-val">${fmtCost(c.total_cost_thb)}</span></span>
        <span><span class="m-lbl">Awarded แล้ว:</span> <span class="m-val">${c.trigger_project_count ?? 0} โครงการ</span></span>
      </div>
    </div>
    <div class="cable-detail" id="cable-detail-${idx}">
      <div class="month-bars">${bars}</div>
      ${projRows ? `<div style="overflow-x:auto"><table class="proj-table">
        <thead><tr><th>โครงการ</th><th style="text-align:right">ปริมาณ (m)</th><th>Award</th><th>สถานะจัดซื้อ</th><th>PO No.</th><th style="text-align:right">ส่งมอบแล้ว (m)</th><th style="text-align:right">คงเหลือต้องส่ง</th></tr></thead>
        <tbody>${projRows}</tbody>
      </table></div>` : '<div style="font-size:12px;color:#a0aec0;padding:10px 0">ไม่มีโครงการที่ต้องใช้สายชนิดนี้ในช่วงนี้</div>'}
      <form id="${formId}" class="add-project-form" onsubmit="event.preventDefault(); addProject('${escAttr(c.name)}', document.getElementById('${formId}'))">
        <span class="add-project-toggle" onclick="event.stopPropagation(); document.getElementById('${formId}').classList.toggle('open')">+ เพิ่มโครงการใหม่</span>
        <div class="add-project-fields">
          <input name="project" type="text" placeholder="ชื่อโครงการ" required>
          <input name="apr" type="number" placeholder="Apr-26">
          <input name="may" type="number" placeholder="May-26">
          <input name="jun" type="number" placeholder="Jun-26">
          <input name="jul" type="number" placeholder="Jul-26">
          <input name="aug" type="number" placeholder="Aug-26">
          <input name="sep" type="number" placeholder="Sep-26">
          <label><input name="award" type="checkbox"> Award</label>
          <input name="notes" type="text" placeholder="Notes">
          <button type="submit">บันทึก</button>
        </div>
      </form>
    </div>
  </div>`;
}

function toggleCable(idx) {
  const el = document.getElementById('cable-detail-' + idx);
  const icon = document.getElementById('toggle-icon-' + idx);
  const open = el.classList.toggle('open');
  icon.textContent = open ? '▲ ซ่อนรายละเอียด' : '▼ ดูรายละเอียด';
}

let lastLiveData = null;
let lastBuilt = null;

function renderAll(liveData, isLive) {
  lastLiveData = isLive ? liveData : null;
  document.getElementById('data-status').innerHTML = isLive
    ? `🟢 Live จาก Google Sheet · ${new Date(liveData.updatedAt).toLocaleString('th-TH')}`
    : (liveData.generated_at ? `🟡 ข้อมูลสำรอง (ไฟล์ static) · ${liveData.generated_at}` : '🟡 ข้อมูล Demo');
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('th-TH', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  let cables, gt, purchaseOrders;
  if (isLive) {
    const built = buildCableTypes(liveData);
    cables = built.cableTypes; gt = built.grandTotal;
    purchaseOrders = liveData.purchaseOrders || [];
    lastBuilt = built;
  } else {
    cables = liveData.cable_types || []; gt = liveData.grand_total || {}; purchaseOrders = [];
  }

  const criticalCount = cables.filter(c => statusInfo(c.status).cls === 'critical').length;
  let deliveredCount = 0;
  cables.forEach(c => (c.projects||[]).forEach(p => { if (p.status === 'Delivered') deliveredCount++; }));

  let html = '';
  html += `<div class="stats-row">
    <div class="stat-card s-blue"><div class="num">${fmtNum(gt.total_demand_m)}</div><div class="lbl">ความต้องการรวม (ม.)<br>Apr–Sep 26</div></div>
    <div class="stat-card s-red"><div class="num">${fmtNum(Math.abs(gt.shortage_m||0))}</div><div class="lbl">ขาดแคลนรวม (ม.)</div></div>
    <div class="stat-card s-orange"><div class="num">${criticalCount} / ${cables.length}</div><div class="lbl">ชนิดสายที่ 🔴 ขาดวิกฤต</div></div>
    <div class="stat-card s-green"><div class="num">${deliveredCount}</div><div class="lbl">โครงการที่ส่งมอบแล้ว (Delivered)</div></div>
  </div>`;

  if (!isLive) {
    html += `<div class="alert">⚠️ กำลังแสดงข้อมูลสำรอง (ไม่ real-time) เพราะดึงจาก Google Sheet ไม่ได้ตอนนี้ — ลองกดรีเฟรชอีกครั้ง</div>`;
  }

  html += `<div class="section">
    <div class="section-header sh-teal">📈 Price Monitoring — ราคากลาง/ราคาตลาด (ย้อนหลัง)<span class="count" id="po-count">0 รายการ</span></div>
    <div class="price-panel">
      <div class="price-controls">
        <label>เลือกเบอร์สาย:
          <select id="price-size-filter" onchange="onSizeFilterChange(this.value)">
            <option value="all">ทั้งหมด</option>
            <option value="4">เบอร์ 4</option>
            <option value="6">เบอร์ 6</option>
            <option value="10">เบอร์ 10</option>
            <option value="16">เบอร์ 16</option>
          </select>
        </label>
      </div>
      <div id="price-monitoring-body"></div>
      <form id="addpoform" class="add-po-form" onsubmit="event.preventDefault(); addPO(document.getElementById('addpoform'))">
        <span class="add-project-toggle" onclick="document.getElementById('addpoform').classList.toggle('open')">+ เพิ่มประวัติการเปิด PO</span>
        <div class="add-project-fields">
          <input name="date" type="date" required>
          <input name="pono" type="text" placeholder="PO No." required>
          <select name="brand"><option>Draka</option><option>Prysmian</option><option>Link</option><option>Other</option></select>
          <select name="size"><option>4</option><option>6</option><option>10</option><option>16</option></select>
          <input name="qty" type="number" placeholder="ปริมาณ (m)">
          <input name="price" type="number" step="0.01" placeholder="ราคา/เมตร">
          <input name="project" type="text" placeholder="โครงการ (ถ้ามี)">
          <button type="submit">บันทึก</button>
        </div>
      </form>
    </div>
  </div>`;

  html += `<div class="section">
    <div class="section-header sh-purple">🥧 ภาพรวมการใช้สาย DC ตามเบอร์</div>
    <div class="pie-panel" id="usage-pie-wrap"></div>
  </div>`;

  html += `<div class="section">
    <div class="section-header sh-navy">🔌 สรุปสถานะสาย DC แต่ละประเภท (แก้ไขได้ในตาราง — เปลี่ยนแล้วบันทึกกลับ Sheet ทันที)<span class="count">${cables.length} ชนิด</span></div>
    ${cables.map((c,i) => renderCableCard(c,i,purchaseOrders)).join('')}
  </div>`;

  document.getElementById('main-content').innerHTML = html;

  if (isLive) {
    try { renderPricePanel(); } catch (e) { console.error('renderPricePanel failed', e); }
    try { renderUsagePie(cables); } catch (e) { console.error('renderUsagePie failed', e); }
  }
}

async function refreshData(silent) {
  try {
    const data = await fetchLive(WEBAPP_URL);
    renderAll(data, true);
  } catch (e) {
    console.error('Live fetch failed, falling back to static JSON', e);
    try {
      const data = await fetchFallback(FALLBACK_JSON_URL);
      renderAll(data, false);
    } catch (e2) {
      console.error('Fallback also failed', e2);
      renderAll({ generated_at: null, grand_total: {}, cable_types: [] }, false);
      if (!silent) {
        document.getElementById('main-content').insertAdjacentHTML('afterbegin',
          `<div class="alert">⚠️ ยังโหลดข้อมูลจริงไม่ได้เลย (เช็คอินเทอร์เน็ต หรือลองกดรีเฟรชอีกครั้ง)</div>`);
      }
    }
  }
}

refreshData();
</script>
