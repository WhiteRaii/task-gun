<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔌 DC Cable Forecast — White | Gunkul Procurement</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; }

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0f2d4a 0%, #1a5276 60%, #1e6b8a 100%);
  color: #fff; padding: 22px 28px 18px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.35);
}
.header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.header h1 { font-size: 19px; font-weight: 700; }
.header .subtitle { font-size: 11px; opacity: 0.7; margin-top: 3px; }
.header-meta { text-align: right; font-size: 11px; opacity: 0.85; line-height: 1.8; }
.header-meta .data-status { font-size: 12px; }
.header-actions { display:flex; gap:6px; justify-content:flex-end; margin-top:4px; align-items:center; }
.refresh-btn {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  color: #fff; border-radius: 6px; padding: 3px 11px; cursor: pointer;
  font-size: 11px; transition: background 0.2s;
}
.refresh-btn:hover { background: rgba(255,255,255,0.28); }

/* Nav tabs */
.nav-tabs { display: flex; gap: 6px; margin-top: 16px; }
.nav-tab {
  color: rgba(255,255,255,0.75); text-decoration: none; font-size: 12px; font-weight: 600;
  padding: 6px 14px; border-radius: 7px 7px 0 0; background: rgba(255,255,255,0.08);
  transition: background 0.15s, color 0.15s;
}
.nav-tab:hover { background: rgba(255,255,255,0.18); color: #fff; }
.nav-tab.active { background: #f0f4f8; color: #1a5276; }

/* ── BODY ── */
.body { max-width: 980px; margin: 0 auto; padding: 22px 14px 70px; }

.loading-box { text-align: center; padding: 70px 20px; color: #718096; }
.spinner {
  width: 30px; height: 30px;
  border: 3px solid #e2e8f0; border-top-color: #4299e1;
  border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.alert { background: #fffbeb; border: 1px solid #f6e05e; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #744210; margin-bottom: 16px; }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; margin-bottom: 18px; }
.stat-card { background: #fff; border-radius: 10px; padding: 13px 12px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.stat-card .num { font-size: 24px; font-weight: 700; }
.stat-card .lbl { font-size: 10px; color: #718096; margin-top: 2px; line-height: 1.3; }
.stat-card.s-red .num { color: #e53e3e; }
.stat-card.s-orange .num { color: #dd6b20; }
.stat-card.s-blue .num { color: #2b6cb0; }
.stat-card.s-green .num { color: #38a169; }

.src-note { font-size: 11px; color: #a0aec0; text-align: right; margin-bottom: 14px; }

/* Section */
.section { margin-bottom: 22px; }
.section-header {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px; border-radius: 10px 10px 0 0;
  font-weight: 700; font-size: 13px; color: #fff;
}
.section-header .count { background: rgba(255,255,255,0.22); border-radius: 99px; padding: 2px 10px; font-size: 11px; margin-left: auto; }
.sh-navy   { background: #1a5276; }
.sh-purple { background: #553c9a; }

/* Cable type card */
.cable-card {
  background: #fff; border-left: 5px solid #cbd5e0;
  border-bottom: 1px solid #e2e8f0; transition: background 0.15s;
}
.cable-card:last-child { border-radius: 0 0 10px 10px; border-bottom: none; }
.cable-card.status-critical { border-left-color: #e53e3e; }
.cable-card.status-warning  { border-left-color: #dd6b20; }
.cable-card.status-ok       { border-left-color: #38a169; }

.cable-head { padding: 13px 16px 11px; cursor: pointer; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.cable-name { font-size: 14.5px; font-weight: 700; }
.cable-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 99px; }
.cable-badge.critical { background: #fed7d7; color: #c53030; }
.cable-badge.warning  { background: #feebc8; color: #c05621; }
.cable-badge.ok       { background: #c6f6d5; color: #276749; }
.cable-reorder { font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 99px; background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
.cable-reorder.ok { background: #f0fff4; color: #276749; border-color: #c6f6d5; }
.cable-toggle { margin-left: auto; font-size: 11px; color: #a0aec0; }

.cable-metrics { display: flex; flex-wrap: wrap; gap: 4px 20px; font-size: 11.5px; color: #4a5568; margin-top: 6px; }
.cable-metrics .m-lbl { color: #a0aec0; }
.cable-metrics .m-val { font-weight: 700; }
.cable-metrics .m-val.neg { color: #c53030; }

.cable-detail { display: none; padding: 0 16px 14px; }
.cable-detail.open { display: block; }

.month-bars { display: flex; gap: 6px; align-items: flex-end; height: 70px; margin: 10px 0 4px; padding: 0 2px; }
.month-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
.month-bar { width: 100%; max-width: 34px; background: #63b3ed; border-radius: 3px 3px 0 0; min-height: 2px; }
.month-bar-val { font-size: 9px; color: #718096; margin-bottom: 2px; }
.month-bar-lbl { font-size: 9.5px; color: #a0aec0; margin-top: 4px; }

.proj-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
.proj-table th { text-align: left; font-size: 10.5px; color: #a0aec0; font-weight: 600; padding: 4px 8px; border-bottom: 1px solid #e2e8f0; }
.proj-table td { padding: 6px 8px; border-bottom: 1px solid #f0f4f8; }
.proj-table tr:last-child td { border-bottom: none; }
.proj-table .qty { text-align: right; font-weight: 600; }
.trigger-yes { color: #c53030; font-weight: 700; font-size: 11px; }
.trigger-no { color: #a0aec0; font-size: 11px; }

/* Project DC-cable status table */
.dc-status-table-wrap { background: #fff; border-radius: 0 0 10px 10px; overflow-x: auto; }
.dc-status-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.dc-status-table th { text-align: left; font-size: 10.5px; color: #a0aec0; font-weight: 700; padding: 8px 12px; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; background: #fff; }
.dc-status-table td { padding: 8px 12px; border-bottom: 1px solid #f0f4f8; }
.dc-status-table tr:hover td { background: #f7fafc; }
.dc-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 99px; white-space: nowrap; }
.dc-badge.onsite { background: #c6f6d5; color: #276749; }
.dc-badge.waiting { background: #fed7d7; color: #c53030; }
.dc-badge.progress { background: #bee3f8; color: #2c5282; }
.dc-badge.none { background: #edf2f7; color: #a0aec0; }
.proj-name-cell { font-weight: 600; }
.proj-type-tag { font-size: 10px; color: #a0aec0; }

.empty-sec { text-align: center; padding: 18px; color: #a0aec0; font-size: 13px; background: #fff; border-radius: 0 0 10px 10px; }
.footer { text-align: center; font-size: 11px; color: #a0aec0; margin-top: 40px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <h1>🔌 DC Cable Forecast</h1>
      <div class="subtitle">Demand Forecast &amp; Allocation · Gunkul Engineering Procurement</div>
    </div>
    <div class="header-meta">
      <div id="today-date">—</div>
      <div class="data-status" id="data-status">⏳ กำลังโหลด...</div>
      <div class="header-actions">
        <button class="refresh-btn" onclick="location.reload()">🔄 รีเฟรช</button>
      </div>
    </div>
  </div>
  <div class="nav-tabs">
    <a class="nav-tab" href="index.html">📋 Daily Tasks</a>
    <a class="nav-tab active" href="material.html">🔌 DC Cable Forecast</a>
  </div>
</div>

<div class="body">
  <div id="main-content"><div class="loading-box"><div class="spinner"></div>กำลังดึงข้อมูลล่าสุด...</div></div>
  <div class="footer">สร้างอัตโนมัติโดย Claude · Gunkul Engineering · Procurement</div>
</div>

<script>
const DEFAULT_URL = 'https://raw.githubusercontent.com/WhiteRaii/task-gun/main/data/material-forecast.json';

function toJsdelivr(url) {
  const m = url.match(/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\/(.+)$/);
  if (!m) return null;
  const [, owner, repo, branch, path] = m;
  return `https://cdn.jsdelivr.net/gh/${owner}/${repo}@${branch}/${path}`;
}
async function fetchOnce(url) {
  const r = await fetch(url + (url.includes('?') ? '&' : '?') + '_=' + Date.now(), { cache: 'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function fetchJSON(url) {
  try { return await fetchOnce(url); }
  catch (e1) {
    await new Promise(res => setTimeout(res, 800));
    try { return await fetchOnce(url); }
    catch (e2) {
      const mirror = toJsdelivr(url);
      if (mirror) {
        try { return await fetchOnce(mirror); }
        catch (e3) { console.warn('fetchJSON failed all attempts', url, e1, e2, e3); throw e3; }
      }
      throw e2;
    }
  }
}

function fmtNum(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString('en-US');
}
function fmtCost(v) {
  if (v === null || v === undefined || v === '') return '—';
  return '฿' + String(v).replace(/\.00$/, '');
}

const STATUS_MAP = {
  '🔴 Critical Shortage': { cls: 'critical', label: '🔴 ขาดวิกฤต' },
  '⚠ Warning': { cls: 'warning', label: '⚠️ เฝ้าระวัง' },
  '✅ Sufficient': { cls: 'ok', label: '✅ เพียงพอ' },
};

function statusInfo(status) {
  return STATUS_MAP[status] || { cls: 'warning', label: status || '—' };
}

function dcBadge(status) {
  if (!status) return '<span class="dc-badge none">ยังไม่เริ่ม</span>';
  const s = status.toLowerCase();
  if (s.includes('on-site')) return `<span class="dc-badge onsite">✅ ${status}</span>`;
  if (s.includes('waiting')) return `<span class="dc-badge waiting">🔴 ${status}</span>`;
  return `<span class="dc-badge progress">🔵 ${status}</span>`;
}

function renderCableCard(c, idx) {
  const info = statusInfo(c.status);
  const reorderOk = (c.reorder_flag || '').toUpperCase() === 'OK';
  const months = ['Apr-26','May-26','Jun-26','Jul-26','Aug-26','Sep-26'];
  const maxVal = Math.max(1, ...months.map(m => c.monthly_demand?.[m] || 0));
  const bars = months.map(m => {
    const v = c.monthly_demand?.[m] || 0;
    const h = Math.max(2, Math.round((v / maxVal) * 60));
    return `<div class="month-bar-wrap">
      <div class="month-bar-val">${v > 0 ? fmtNum(v) : ''}</div>
      <div class="month-bar" style="height:${h}px; background:${v>0 ? '#63b3ed' : '#e2e8f0'}"></div>
      <div class="month-bar-lbl">${m.replace('-26','')}</div>
    </div>`;
  }).join('');

  const projRows = (c.projects || []).map(p => `
    <tr>
      <td>${p.project}</td>
      <td class="qty">${fmtNum(p.total_qty_m)} m</td>
      <td>${p.trigger ? '<span class="trigger-yes">🔺 Trigger</span>' : '<span class="trigger-no">—</span>'}</td>
    </tr>`).join('');

  return `
  <div class="cable-card status-${info.cls}">
    <div class="cable-head" onclick="toggleCable(${idx})">
      <span class="cable-name">${c.name}</span>
      <span class="cable-badge ${info.cls}">${info.label}</span>
      <span class="cable-reorder ${reorderOk ? 'ok' : ''}">${c.reorder_flag || '—'}</span>
      <span class="cable-toggle" id="toggle-icon-${idx}">▼ ดูรายละเอียด</span>
      <div class="cable-metrics" style="width:100%">
        <span><span class="m-lbl">ความต้องการรวม:</span> <span class="m-val">${fmtNum(c.total_demand_m)} m</span></span>
        <span><span class="m-lbl">คงเหลือ:</span> <span class="m-val">${fmtNum(c.stock_on_hand)} m</span></span>
        <span><span class="m-lbl">ขาด/เกิน:</span> <span class="m-val ${c.shortage_m < 0 ? 'neg' : ''}">${fmtNum(c.shortage_m)} m</span></span>
        <span><span class="m-lbl">ราคา/ม.:</span> <span class="m-val">${c.unit_price_thb_per_m ? '฿' + c.unit_price_thb_per_m : 'N/A'}</span></span>
        <span><span class="m-lbl">มูลค่ารวม:</span> <span class="m-val">${fmtCost(c.total_cost_thb)}</span></span>
        <span><span class="m-lbl">โครงการกระตุ้นสั่งซื้อ:</span> <span class="m-val">${c.trigger_project_count ?? 0}</span></span>
      </div>
    </div>
    <div class="cable-detail" id="cable-detail-${idx}">
      <div class="month-bars">${bars}</div>
      ${projRows ? `<table class="proj-table">
        <thead><tr><th>โครงการ</th><th style="text-align:right">ปริมาณ</th><th>Trigger สั่งซื้อ</th></tr></thead>
        <tbody>${projRows}</tbody>
      </table>` : '<div style="font-size:12px;color:#a0aec0;padding:10px 0">ไม่มีโครงการที่ต้องใช้สายชนิดนี้ในช่วงนี้</div>'}
    </div>
  </div>`;
}

function toggleCable(idx) {
  const el = document.getElementById('cable-detail-' + idx);
  const icon = document.getElementById('toggle-icon-' + idx);
  const open = el.classList.toggle('open');
  icon.textContent = open ? '▲ ซ่อนรายละเอียด' : '▼ ดูรายละเอียด';
}

function renderProjectsTable(projects) {
  // เรียง: Waiting PR ก่อน (ต้องติดตาม) -> On-Site ท้ายสุด
  const priority = s => {
    if (!s) return 0;
    const l = s.toLowerCase();
    if (l.includes('waiting')) return 1;
    if (l.includes('on-site')) return 3;
    return 2;
  };
  const sorted = [...projects].sort((a,b) => priority(a.dc_cable_status) - priority(b.dc_cable_status));
  const rows = sorted.map(p => `
    <tr>
      <td><div class="proj-name-cell">${p.project_name}</div><div class="proj-type-tag">${p.project_id} · ${p.type}${p.pm ? ' · PM: '+p.pm : ''}</div></td>
      <td>${dcBadge(p.dc_cable_status)}</td>
      <td>${dcBadge(p.dc_cable_delivery)}</td>
      <td>${p.pa_po_progress_pct !== null && p.pa_po_progress_pct !== undefined ? p.pa_po_progress_pct + '%' : '—'}</td>
    </tr>`).join('');
  return `<div class="dc-status-table-wrap"><table class="dc-status-table">
    <thead><tr><th>โครงการ</th><th>สถานะ DC Cable</th><th>สถานะส่งมอบ</th><th>PA/PO %</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderAll(data) {
  const gen = data?.generated_at;
  document.getElementById('data-status').innerHTML = gen ? `🟢 อัปเดต ${gen.replace('T',' น.')}` : '🟡 ข้อมูล Demo';
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('th-TH', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  const cables = data?.cable_types || [];
  const projects = data?.projects_dc_cable_status || [];
  const gt = data?.grand_total || {};
  const eq = data?.equipment_status_counts || {};
  const criticalCount = cables.filter(c => c.status === '🔴 Critical Shortage').length;

  let html = '';

  html += `<div class="stats-row">
    <div class="stat-card s-blue"><div class="num">${fmtNum(gt.total_demand_m)}</div><div class="lbl">ความต้องการรวม (ม.)<br>Apr–Sep 26</div></div>
    <div class="stat-card s-red"><div class="num">${fmtNum(Math.abs(gt.shortage_m||0))}</div><div class="lbl">ขาดแคลนรวม (ม.)</div></div>
    <div class="stat-card s-orange"><div class="num">${criticalCount} / ${cables.length}</div><div class="lbl">ชนิดสายที่ 🔴 ขาดวิกฤต</div></div>
    <div class="stat-card s-green"><div class="num">${eq['On-Site'] ?? 0}</div><div class="lbl">โครงการที่ DC Cable ถึงหน้างานแล้ว</div></div>
  </div>`;

  if (data?.source_last_updated) {
    html += `<div class="src-note">ข้อมูลจากไฟล์ต้นทาง อัปเดตล่าสุด: ${data.source_last_updated}</div>`;
  }

  html += `<div class="section">
    <div class="section-header sh-navy">🔌 สรุปสถานะสาย DC แต่ละประเภท<span class="count">${cables.length} ชนิด</span></div>
    ${cables.map((c,i) => renderCableCard(c,i)).join('')}
  </div>`;

  html += `<div class="section">
    <div class="section-header sh-purple">🏗️ สถานะ DC Cable ต่อโครงการ<span class="count">${projects.length} โครงการ</span></div>
    ${projects.length ? renderProjectsTable(projects) : '<div class="empty-sec">ไม่มีข้อมูลโครงการ</div>'}
  </div>`;

  document.getElementById('main-content').innerHTML = html;
}

function renderDemo() {
  renderAll({
    generated_at: null,
    source_last_updated: null,
    grand_total: { total_demand_m: 0, shortage_m: 0 },
    equipment_status_counts: {},
    cable_types: [],
    projects_dc_cable_status: [],
  });
  document.getElementById('main-content').insertAdjacentHTML('afterbegin',
    `<div class="alert">⚠️ ยังโหลดข้อมูลจริงไม่ได้ (เช็คอินเทอร์เน็ต หรือลองกดรีเฟรชอีกครั้ง) — กำลังแสดงข้อมูลว่างชั่วคราว</div>`);
}

(async function init() {
  try {
    const data = await fetchJSON(DEFAULT_URL);
    renderAll(data);
  } catch (e) {
    console.error('Failed to load material-forecast.json', e);
    renderDemo();
  }
})();
</script>

</body>
</html>
